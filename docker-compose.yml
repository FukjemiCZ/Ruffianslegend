version: "3.9"

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    environment:
      - WATCHPACK_POLLING=true
      - NODE_ENV=development

volumes:
  node_modules:
  pnpm_store:
